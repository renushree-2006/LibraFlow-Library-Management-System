<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LibraFlow — Login</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #0f1117;
    --paper: #f7f4ef;
    --cream: #ede8df;
    --gold: #c9a84c;
    --gold-light: #e8d5a3;
    --text: #2a2a35;
    --muted: #7a7a8a;
    --border: #d8d3ca;
    --white: #ffffff;
    --danger: #c0392b;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--paper);
    min-height: 100vh;
    display: grid;
    grid-template-columns: 1fr 1fr;
  }

  .left-panel {
    background: var(--ink);
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 60px;
    position: relative;
    overflow: hidden;
  }

  .left-panel::before {
    content: '';
    position: absolute;
    top: -100px; right: -100px;
    width: 400px; height: 400px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(201,168,76,0.15) 0%, transparent 70%);
  }

  .left-panel::after {
    content: '';
    position: absolute;
    bottom: -80px; left: -80px;
    width: 300px; height: 300px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(201,168,76,0.1) 0%, transparent 70%);
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .brand-icon {
    width: 40px; height: 40px;
    background: var(--gold);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
  }

  .brand-name {
    font-family: 'DM Serif Display', serif;
    color: var(--white);
    font-size: 22px;
    letter-spacing: -0.3px;
  }

  .left-content {
    position: relative; z-index: 1;
  }

  .left-content h1 {
    font-family: 'DM Serif Display', serif;
    font-size: 52px;
    color: var(--white);
    line-height: 1.1;
    margin-bottom: 20px;
    letter-spacing: -1px;
  }

  .left-content h1 em {
    color: var(--gold);
    font-style: italic;
  }

  .left-content p {
    color: rgba(255,255,255,0.55);
    font-size: 16px;
    line-height: 1.7;
    max-width: 340px;
  }

  .stats-row {
    display: flex;
    gap: 40px;
    position: relative; z-index: 1;
  }

  .stat {
    border-top: 1px solid rgba(255,255,255,0.12);
    padding-top: 16px;
  }

  .stat-num {
    font-family: 'DM Serif Display', serif;
    font-size: 28px;
    color: var(--gold);
  }

  .stat-label {
    font-size: 12px;
    color: rgba(255,255,255,0.4);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-top: 2px;
  }

  .right-panel {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 60px 80px;
  }

  .form-card {
    width: 100%;
    max-width: 380px;
    animation: fadeUp 0.6s ease;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .form-header {
    margin-bottom: 40px;
  }

  .form-header h2 {
    font-family: 'DM Serif Display', serif;
    font-size: 34px;
    color: var(--ink);
    letter-spacing: -0.5px;
  }

  .form-header p {
    color: var(--muted);
    margin-top: 6px;
    font-size: 15px;
  }

  .form-group {
    margin-bottom: 20px;
  }

  label {
    display: block;
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
    margin-bottom: 8px;
    letter-spacing: 0.2px;
  }

  input {
    width: 100%;
    padding: 13px 16px;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    background: var(--white);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    color: var(--text);
    transition: border-color 0.2s, box-shadow 0.2s;
    outline: none;
  }

  input:focus {
    border-color: var(--gold);
    box-shadow: 0 0 0 3px rgba(201,168,76,0.12);
  }

  .btn-primary {
    width: 100%;
    padding: 14px;
    background: var(--ink);
    color: var(--white);
    border: none;
    border-radius: 10px;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 8px;
    transition: background 0.2s, transform 0.1s;
    letter-spacing: 0.2px;
  }

  .btn-primary:hover { background: #1e2030; }
  .btn-primary:active { transform: scale(0.99); }

  .form-footer {
    text-align: center;
    margin-top: 24px;
    font-size: 14px;
    color: var(--muted);
  }

  .form-footer a {
    color: var(--gold);
    text-decoration: none;
    font-weight: 600;
  }

  .form-footer a:hover { text-decoration: underline; }

  .divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 24px 0;
    color: var(--border);
    font-size: 12px;
  }

  .divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }
</style>
</head>
<body>

<div class="left-panel">
  <div class="brand">
    <div class="brand-icon">📚</div>
    <span class="brand-name">LibraFlow</span>
  </div>

  <div class="left-content">
    <h1>Manage your <em>library</em> with ease.</h1>
    <p>Track books, manage students, monitor due dates, and keep everything organized — all in one place.</p>
  </div>

  <div class="stats-row">
    <div class="stat">
      <div class="stat-num">∞</div>
      <div class="stat-label">Books</div>
    </div>
    <div class="stat">
      <div class="stat-num">0</div>
      <div class="stat-label">Overdue</div>
    </div>
    <div class="stat">
      <div class="stat-num">24/7</div>
      <div class="stat-label">Available</div>
    </div>
  </div>
</div>

<div class="right-panel">
  <div class="form-card">
    <div class="form-header">
      <h2>Welcome back.</h2>
      <p>Sign in to your library dashboard.</p>
    </div>

    <form method="post">
      <div class="form-group">
        <label>Username</label>
        <input name="username" placeholder="Enter your username" required>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" placeholder="••••••••" required>
      </div>
      <button class="btn-primary" type="submit">Sign In →</button>
    </form>

    <div class="form-footer">
      Don't have an account? <a href="/register">Create one</a>
    </div>
  </div>
</div>

</body>
</html>
